    <p>本站用于向已有及潜在客户展示服装款式、颜色、尺码与库存状态，并接收选款询价。</p>
    <h2>本站不会进行的操作</h2>
    <p>本站不提供在线支付，不要求用户下载应用，不提供投资、博彩、贷款或虚拟币服务，也不会以系统升级等理由索取银行卡、短信验证码或支付密码。</p>
    <h2>正常使用流程</h2>
    <p>客户浏览款式，选择颜色、尺码和数量，提交询价后，由经营人员联系确认报价、库存和交期。</p>
    <h2>账号与数据</h2>
    <p>账号仅用于保存询价和订单记录。用户可以在不登录的情况下浏览商品，只有提交询价时才需要登录。</p>
